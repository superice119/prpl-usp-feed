name: Build packages

# Builds the prpl USP feed as OpenWrt .ipk packages for mt7621 and rk3308,
# using the official OpenWrt **SDK tarball** (no Docker) downloaded straight from
# downloads.openwrt.org, with dl/ + SDK caching so repeat builds are fast.
#
#   board    OpenWrt target     package arch
#   mt7621   ramips/mt7621      mipsel_24kc
#   rk3308   rockchip/armv8     aarch64_generic
#
# Only this feed's packages are set to =m, so `make` compiles our 35 packages
# (and their dependencies) — nothing else from the OpenWrt tree.

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      version:
        description: 'OpenWrt release (SDK version), e.g. 24.10.7'
        required: false
        default: '24.10.7'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DEFAULT_VERSION: '24.10.7'
  FEEDNAME: prpl_usp

jobs:
  build:
    name: ${{ matrix.board }} (${{ matrix.arch }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - board: mt7621
            target: ramips/mt7621
            arch: mipsel_24kc
          - board: rk3308
            target: rockchip/armv8
            arch: aarch64_generic
    steps:
      - name: Checkout feed
        uses: actions/checkout@v4
        with:
          path: feed

      - name: Install host build dependencies
        run: |
          # Mirrors the OpenWrt buildbot buildworker image (the base of openwrt/sdk),
          # so the bare runner has the same host toolchain the official SDK ships with.
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential ccache curl file gawk g++-multilib gcc-multilib \
            gettext git libdw-dev libelf-dev libncurses5-dev libssl-dev locales \
            python3 python3-venv python3-pip python3-setuptools python3-pyelftools \
            python3-cryptography rsync subversion swig unzip wget xsltproc \
            zlib1g-dev zstd

      - name: Resolve OpenWrt version + SDK URL
        id: sdk
        run: |
          set -euo pipefail
          VERSION="${{ github.event.inputs.version || env.DEFAULT_VERSION }}"
          BASE="https://downloads.openwrt.org/releases/${VERSION}/targets/${{ matrix.target }}"
          # Derive the exact SDK filename (carries the gcc version) — never hardcode it.
          FILE="$(curl -fsSL "${BASE}/" | grep -ioE 'openwrt-sdk[^"<> ]*\.tar\.(zst|xz)' | sort -u | head -1)"
          if [ -z "${FILE}" ]; then echo "::error::no SDK tarball found at ${BASE}/"; exit 1; fi
          echo "version=${VERSION}"      >> "$GITHUB_OUTPUT"
          echo "file=${FILE}"            >> "$GITHUB_OUTPUT"
          echo "url=${BASE}/${FILE}"     >> "$GITHUB_OUTPUT"
          echo "Resolved SDK: ${BASE}/${FILE}"

      - name: Cache SDK tarball
        uses: actions/cache@v4
        with:
          path: sdk.tar
          key: sdk-${{ steps.sdk.outputs.file }}

      - name: Download + extract SDK
        run: |
          set -euo pipefail
          if [ ! -s sdk.tar ]; then
            wget -q -O sdk.tar "${{ steps.sdk.outputs.url }}"
          fi
          mkdir -p sdk
          case "${{ steps.sdk.outputs.file }}" in
            *.zst) tar --use-compress-program=unzstd -xf sdk.tar -C sdk --strip-components=1 ;;
            *.xz)  tar -xf sdk.tar -C sdk --strip-components=1 ;;
          esac

      - name: Cache downloads (dl/)
        uses: actions/cache@v4
        with:
          path: sdk/dl
          key: dl-${{ matrix.arch }}-${{ steps.sdk.outputs.version }}-${{ hashFiles('feed/**/Makefile') }}
          restore-keys: |
            dl-${{ matrix.arch }}-${{ steps.sdk.outputs.version }}-
            dl-${{ matrix.arch }}-

      - name: Cache feeds (avoids re-cloning openwrt.git 'base' feed each run)
        uses: actions/cache@v4
        with:
          path: sdk/feeds
          # Feed pins are fixed per OpenWrt release, so version is a safe key.
          key: feeds-${{ matrix.arch }}-${{ steps.sdk.outputs.version }}
          restore-keys: |
            feeds-${{ matrix.arch }}-

      - name: Wire feed + install packages
        working-directory: sdk
        run: |
          set -euo pipefail
          # Use the SDK's FULL feeds.conf.default (it includes the 'base' feed that
          # provides libopenssl/mbedtls/libubus/libxml2 — without it every TLS consumer
          # fails). Mirror openwrt/gh-action-sdk exactly, including its git.openwrt.org ->
          # github.com rewrite (git.openwrt.org is frequently slow/unreachable from CI).
          sed \
            -e 's,https://git.openwrt.org/feed/,https://github.com/openwrt/,' \
            -e 's,https://git.openwrt.org/openwrt/,https://github.com/openwrt/,' \
            -e 's,https://git.openwrt.org/project/,https://github.com/openwrt/,' \
            feeds.conf.default > feeds.conf
          echo "src-link ${FEEDNAME} ${GITHUB_WORKSPACE}/feed" >> feeds.conf
          cat feeds.conf
          ./scripts/feeds update -a
          ./scripts/feeds install -a -p "${FEEDNAME}"

      - name: Configure (enable only this feed's packages)
        working-directory: sdk
        run: |
          set -euo pipefail
          echo "CONFIG_CCACHE=y" >> .config
          # Set =m for every package this feed defines (PKG_NAME may differ from dir).
          : > /tmp/pkglist
          while IFS= read -r mk; do
            pn="$(sed -n 's/^PKG_NAME:=//p' "$mk" | head -1)"
            [ -n "$pn" ] && echo "$pn" >> /tmp/pkglist
          done < <(find "${GITHUB_WORKSPACE}/feed" -name Makefile)
          sort -u /tmp/pkglist -o /tmp/pkglist
          while read -r pn; do echo "CONFIG_PACKAGE_${pn}=m" >> .config; done < /tmp/pkglist
          make defconfig
          echo "Will build $(wc -l < /tmp/pkglist) feed packages."

      - name: Compile
        working-directory: sdk
        run: |
          set -uo pipefail
          export PATH="/usr/lib/ccache:$PATH"
          # Single parallel make; IGNORE_ERRORS keeps going so one bad package does not
          # mask the rest (diagnostic mode — flip off for a strict gate once all green).
          make -j"$(nproc)" V=s IGNORE_ERRORS=1 || true
          echo "=== build summary ==="
          while read -r pn; do
            if ls bin/packages/*/"${FEEDNAME}"/"${pn}"_*.ipk >/dev/null 2>&1; then
              echo "  OK    ${pn}"
            else
              echo "  FAIL  ${pn}"
            fi
          done < /tmp/pkglist

      - name: Collect artifacts
        run: |
          set -euo pipefail
          mkdir -p out
          find sdk/bin -path "*/${FEEDNAME}/*.ipk" -exec cp -v {} out/ \;
          echo "collected $(find out -name '*.ipk' | wc -l) package(s):"
          ls -1 out

      - name: Upload .ipk artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ipk-${{ matrix.board }}-${{ matrix.arch }}
          path: out/*.ipk
          if-no-files-found: error

  release:
    name: Publish Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Stage release files (prefix by board)
        run: |
          mkdir -p release
          for d in dist/ipk-*; do
            tag="$(basename "$d" | sed 's/^ipk-//')"
            for f in "$d"/*.ipk; do
              [ -e "$f" ] || continue
              cp -v "$f" "release/${tag}-$(basename "$f")"
            done
          done
          ls -l release

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*.ipk
          generate_release_notes: true
